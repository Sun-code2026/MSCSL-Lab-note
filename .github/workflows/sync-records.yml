name: Sync central notebook records

on:
  issues:
    types: [opened, edited, deleted, transferred, pinned, unpinned, closed, reopened, assigned, unassigned, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: sync-central-records
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync records from GitHub Issues
        run: node scripts/sync-records.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit central records
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Sync central notebook records
          file_pattern: records/records.json records/records.csv records/records.md
